<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人专属主页</title>
    <style>
        /* 基础样式复位与优雅的渐变背景 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background: linear-gradient(180deg, #f4f7fc 0%, #eef2f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 15px;
            color: #333;
        }
        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 顶部时钟卡片 */
        .card-clock {
            background: #ffffff;
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(162, 178, 204, 0.2);
        }
        .card-clock h1 {
            color: #1a4ba3;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .card-clock .subtitle {
            color: #8a99ad;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .time-display {
            color: #2b66ff;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .date-display {
            color: #657795;
            font-size: 14px;
            margin-top: 8px;
            font-weight: 500;
        }

        /* 导航按钮网格 */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        /* 统一按钮样式包裹层 */
        .nav-item {
            position: relative;
            width: 100%;
        }

        .nav-btn {
            display: block;
            background: #3b74ff;
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 18px 10px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 0 6px 20px rgba(59, 116, 255, 0.25);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nav-btn:active {
            transform: scale(0.95);
            opacity: 0.9;
            background: #255ee0;
            box-shadow: 0 3px 10px rgba(59, 116, 255, 0.15);
        }

        /* 自定义添加的链接按钮样式 */
        .custom-item .nav-btn {
            background: linear-gradient(135deg, #4e7fff 0%, #3b74ff 100%);
        }

        /* 删除按钮小红叉 */
        .delete-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            background: rgba(255, 78, 78, 0.9);
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 18px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border: 1.5px solid #fff;
            display: block; /* 自定义按钮直接显示删除标志 */
        }

        /* 底部的添加与备份工具栏 */
        .action-area {
            text-align: center;
            margin-top: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .add-btn {
            display: inline-block;
            background: rgba(59, 116, 255, 0.08);
            color: #3b74ff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            border: 1px dashed rgba(59, 116, 255, 0.3);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .add-btn:active {
            background: rgba(59, 116, 255, 0.15);
            transform: scale(0.98);
        }
        .backup-tools {
            display: flex;
            gap: 15px;
        }
        .tools-link {
            font-size: 12px;
            color: #8a99ad;
            text-decoration: none;
            cursor: pointer;
        }
        .tools-link:active {
            color: #3b74ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card-clock">
            <h1>我的个人主页</h1>
            <div class="subtitle">完全用手机在 GitHub 搭建</div>
            <div class="time-display" id="clock">00:00:00</div>
            <div class="date-display" id="date">2026年01月01日 星期一</div>
        </div>

        <!-- 导航网格 -->
        <div class="nav-grid" id="nav-grid">
            <div class="nav-item"><a href="https://github.com" class="nav-btn" target="_blank">GitHub</a></div>
     <!-- 自定义添加的网站会自动接在后面 -->
        </div>

        <!-- 操作区 -->
        <div class="action-area">
            <a href="javascript:void(0);" class="add-btn" onclick="addCustomLink()">+ 添加自定义导航</a>
            
            <!-- 方案B：跨浏览器备份导入工具 -->
            <div class="backup-tools">
                <span class="tools-link" onclick="exportLinks()">📤 备份数据</span>
                <span class="tools-link" onclick="importLinks()">📥 导入数据</span>
            </div>
        </div>
    </div>

    <script>
        // 1. 动态时钟与日期更新
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const day = weekDays[now.getDay()];
            document.getElementById('date').textContent = `${year}年${month}月${date}日 ${day}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. 网页无代码添加/删除/备份/导入网站逻辑
        const STORAGE_KEY = 'my_custom_links';

        function getCustomLinks() {
            const links = localStorage.getItem(STORAGE_KEY);
            return links ? JSON.parse(links) : [];
        }

        function renderCustomLinks() {
            document.querySelectorAll('.custom-item').forEach(el => el.remove());
            
            const grid = document.getElementById('nav-grid');
            const links = getCustomLinks();
            
            links.forEach((link, index) => {
                const item = document.createElement('div');
                item.className = 'nav-item custom-item';
                item.innerHTML = `
                    <a href="${link.url}" class="nav-btn" target="_blank">${link.name}</a>
                    <div class="delete-btn" onclick="deleteLink(${index})">×</div>
                `;
                grid.appendChild(item);
            });
        }

        function addCustomLink() {
            const name = prompt("请输入网站名称（例如：哔哩哔哩）：");
            if (!name) return;
            
            let url = prompt("请输入完整网址（例如：https://www.bilibili.com）：");
            if (!url) return;

            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }

            const links = getCustomLinks();
            links.push({ name, url });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
            
            renderCustomLinks();
        }

        function deleteLink(index) {
            if (confirm("确定要删除这个导航按钮吗？")) {
                const links = getCustomLinks();
                links.splice(index, 1);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
                renderCustomLinks();
            }
        }

        // 导出备份口令
        function exportLinks() {
            const links = localStorage.getItem(STORAGE_KEY);
            if (!links || links === '[]') {
                alert("你当前还没有添加任何自定义网站，无需备份。");
                return;
            }
            // 使用 base64 简单编码，方便复制且不易出错
            const backupCode = btoa(unescape(encodeURIComponent(links)));
            prompt("这是你的导航数据备份口令，请复制并保存好。在其他浏览器点击“导入数据”粘入即可：", backupCode);
        }

        // 导入备份口令
        function importLinks() {
            const backupCode = prompt("请粘贴你之前备份的导航数据口令：");
            if (!backupCode) return;
            
            try {
                const decodedLinks = decodeURIComponent(escape(atob(backupCode)));
                // 验证是不是合法的JSON
                const parsed = JSON.parse(decodedLinks);
                if (Array.isArray(parsed)) {
                    if (confirm("导入后会覆盖当前浏览器中已有的自定义链接，确定导入吗？")) {
                        localStorage.setItem(STORAGE_KEY, decodedLinks);
                        renderCustomLinks();
                        alert("数据导入成功！");
                    }
                } else {
                    alert("口令格式错误，请检查是否复制完整！");
                }
            } catch (e) {
                alert("无效的备份口令，解析失败！");
            }
        }

        renderCustomLinks();
    </script>

</body>
</html>

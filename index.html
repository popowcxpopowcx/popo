<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人专属主页</title>
    <style>

        /* 基础样式复位与优雅的渐变背景 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background: linear-gradient(180deg, #f4f7fc 0%, #eef2f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 15px;
            color: #333;
        }
        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 顶部时钟卡片美化 */
        .card-clock {
            background: #ffffff;
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(162, 178, 204, 0.2);
        }
        .card-clock h1 {
            color: #1a4ba3;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .card-clock .subtitle {
            color: #8a99ad;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .time-display {
            color: #2b66ff;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .date-display {
            color: #657795;
            font-size: 14px;
            margin-top: 8px;
            font-weight: 500;
        }

        /* 导航按钮网格 */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .nav-btn {
            background: #3b74ff;
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 18px 10px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 0 6px 20px rgba(59, 116, 255, 0.25);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent; /* 清除手机点击阴影 */
        }
        /* 手机端按下效果优化 */
        .nav-btn:active {
            transform: scale(0.95);
            opacity: 0.9;
            background: #255ee0;
            box-shadow: 0 3px 10px rgba(59, 116, 255, 0.15);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card-clock">
            <h1>我的个人主页</h1>
            <div class="subtitle">完全用手机在 GitHub 搭建</div>
            <div class="time-display" id="clock">00:00:00</div>
            <div class="date-display" id="date">2026年01月01日 星期一</div>
        </div>

        <!-- 导航网格 -->
        <div class="nav-grid">
            <a href="https://www.baidu.com" class="nav-btn" target="_blank">百度一下</a>
            <a href="https://www.zhihu.com" class="nav-btn" target="_blank">知乎</a>
            <a href="https://v.qq.com" class="nav-btn" target="_blank">腾讯视频</a>
            <a href="https://news.sina.com.cn" class="nav-btn" target="_blank">新浪新闻</a>
            <a href="https://github.com" class="nav-btn" target="_blank">GitHub</a>
            <a href="https://m.weibo.cn/p/index?containerid=106003type=25&t=3&disable_hot=1&filter_type=realtimehot&title=微博热搜&show_cache_when_error=1&extparam=seat=1&cate=10103&pos=0_0&region_relas_conf=0&c_type=30&dgr=0&filter_type=realtimehot&lcate=1001&mi_cid=100103&display_time=1694559106&pre_seqid=383600415&luicode=10000011&lfid=102803" class="nav-btn" target="_blank">微博热搜</a>
        </div>
    </div>

    <script>
        // 动态时钟与日期更新
        function updateClock() {
            const now = new Date();
            
            // 时间部分
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            // 日期部分
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const day = weekDays[now.getDay()];
            document.getElementById('date').textContent = `${year}年${month}月${date}日 ${day}`;
        }
        setInterval(updateClock, 1000);
        updateClock(); // 首次加载立即执行
    </script>

</body>
</html>
